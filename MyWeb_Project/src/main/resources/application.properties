spring.application.name=MyWeb_Project

# context path : 3번째 레벨 패키지명과 동일하게
server.servlet.context-path=/myweb

# port 번호 : 8006 (안쓰면 기본값이 8080, 단 오라클이 사용중인 포트번호라 충돌남)
server.port=8006

# 우리 사이트의 메인페이지 url 주소
# http://localhost:8006/myweb

# View Resolver 설정 : jsp 파일 경로 자동완성
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# 오라클과 MyBatis 라이브러리가 연동 된 후에는 반드시 application.properties 파일에
# 해당 연동 설정 구문까지 같이 작성해야만 한다!! (안그러면 오류남)

# 오라클 연동 구문
spring.datasource.driver-class-name=oracle.jdbc.driver.OracleDriver
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=SPRING
spring.datasource.password=SPRING

# 마이바티스 연동 구문
mybatis.config-location=classpath:mybatis-config.xml
mybatis.mapper-locations=classpath:mappers/*.xml
# classpath: 은 소스폴더인 src/main/resouces 폴더를 의미한다.

# 파일업로드 관련 설정 구문
spring.servlet.multipart.max-file-size=10MB
    # 악의적인 공격을 막기 위한 파일 업로드 용량 제한 설정
spring.servlet.multipart.max-request-size=10MB
    # 악의적인 공격을 막기 위한 파일 다운로드 용량 제한 설정

